<!DOCTYPE html>
<html>
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>GBM - PnL e Drawdown</title>
</head>
<body>

<h2>Simulazione GBM con Strategia</h2>

<label>Inserisci N: </label>
<input type="number" id="n">

<button onclick="runSimulation()">Simula</button>

<p id="output"></p>

<script>

function randn() {
  let u = Math.random();
  let v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

function runSimulation() {

  // Parametri
  let T = parseInt(document.getElementById("n").value);

  const mu = 0.05;
  const sigma = 0.2;
  const S0 = 100;
  const dt = 1 / 252;
  const window = 20;

  // Simulazione GBM
  let S = [S0];

  for (let t = 0; t < T; t++) {

    let Z = randn();

    let St = S[t] * Math.exp(
      (mu - 0.5 * sigma * sigma) * dt +
      sigma * Math.sqrt(dt) * Z
    );

    S.push(St);
  }

  // Moving Average
  let MA = new Array(S.length).fill(null);

  for (let i = window; i < S.length; i++) {

    let sum = 0;

    for (let j = i - window; j < i; j++) {
      sum += S[j];
    }

    MA[i] = sum / window;
  }

  // Strategia
  let position = [];

  for (let i = 0; i < S.length; i++) {

    if (MA[i] !== null && S[i] > MA[i]) {
      position.push(1);
    } else {
      position.push(0);
    }
  }

  // Returns
  let returns = [0];

  for (let i = 1; i < S.length; i++) {

    let r = (S[i] - S[i - 1]) / S[i - 1];

    returns.push(r);
  }

  // Returns strategia
  let stratReturns = [];

  for (let i = 0; i < returns.length; i++) {

    let pos = position[i - 1] || 0;

    stratReturns.push(pos * returns[i]);
  }

  // PnL
  let pnl = [1];

  for (let i = 1; i < stratReturns.length; i++) {

    pnl.push(
      pnl[i - 1] * (1 + stratReturns[i])
    );
  }

  // Drawdown
  let maxSoFar = pnl[0];
  let maxDD = 0;

  for (let i = 1; i < pnl.length; i++) {

    if (pnl[i] > maxSoFar) {
      maxSoFar = pnl[i];
    }

    let dd = (pnl[i] - maxSoFar) / maxSoFar;

    if (dd < maxDD) {
      maxDD = dd;
    }
  }

  // Risultati finali
  let totalPnL = pnl[pnl.length - 1] - 1;

  // Output
  document.getElementById("output").innerHTML =
    "<b>PnL:</b> " + (totalPnL * 100).toFixed(2) + "%<br>" +
    "<b>Max DD:</b> " + (maxDD * 100).toFixed(2) + "%";
}

</script>

</body>
</html>
