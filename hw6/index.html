<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test GBM</title>
</head>
<body>

<h2>Risultati</h2>
<p id="output">Caricamento...</p>

<script>

// Test immediato per vedere se JS parte
document.getElementById("output").innerHTML = "Script partito";

// Parametri
let T = 100;
let S = [100];

// Simulazione semplice (no GBM complesso)
for (let i = 0; i < T; i++) {
  let rnd = Math.random() - 0.5;
  S.push(S[i] * (1 + rnd * 0.02));
}

// PnL
let pnl = S[S.length - 1] / S[0] - 1;

// Drawdown
let max = S[0];
let maxDD = 0;

for (let i = 1; i < S.length; i++) {
  if (S[i] > max) max = S[i];
  let dd = (S[i] - max) / max;
  if (dd < maxDD) maxDD = dd;
}

// Output
document.getElementById("output").innerHTML =
  "PnL: " + (pnl * 100).toFixed(2) + "%<br>" +
  "Max DD: " + (maxDD * 100).toFixed(2) + "%";

</script>

</body>
</html>
